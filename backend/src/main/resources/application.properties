# =============================================
# DATABASE (Supabase PostgreSQL)
# =============================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# =============================================
# SERVER
# =============================================
server.port=${PORT:8080}

# =============================================
# CORS (ajuste para seu domínio Vercel)
# =============================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,https://*.vercel.app}

# =============================================
# ADMIN CREDENTIALS
# =============================================
app.admin.username=${ADMIN_USERNAME:teste}
app.admin.password=${ADMIN_PASSWORD:teste}

# =============================================
# API-Football (RapidAPI)
# =============================================
app.football-api.key=${RAPIDAPI_KEY:your_key_here}
app.football-api.base-url=https://v3.football.api-sports.io
app.football-api.daily-limit=100

# Copa do Mundo 2026 — League ID: 1 (World Cup), Season: 2026
app.football-api.league-id=1
app.football-api.season=2026

# =============================================
# BET DEADLINE (ISO-8601 BRT = -03:00)
# =============================================
app.bet.deadline=2026-06-11T16:00:00-03:00

# =============================================
# SCHEDULER
# =============================================
spring.task.scheduling.pool.size=5
